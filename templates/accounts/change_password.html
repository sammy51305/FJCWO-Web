{% extends "base.html" %}

{% block title %}設定新密碼 — 百韻管樂團{% endblock %}

{% block content %}
{% if messages %}
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
{% endif %}

<div class="row justify-content-center">
  <div class="col-lg-5">
    <h2 class="mb-3">設定新密碼</h2>
    <p class="text-muted mb-4">您目前使用的是幹部建立帳號時的臨時密碼，請先設定一組只有您自己知道的新密碼才能繼續使用系統。</p>

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">新密碼 <span class="text-danger">*</span></label>
        <input type="password" name="new_password1" class="form-control" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">確認新密碼 <span class="text-danger">*</span></label>
        <input type="password" name="new_password2" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary">設定新密碼</button>
    </form>
  </div>
</div>
{% endblock %}
