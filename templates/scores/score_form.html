{% extends "base.html" %}

{% block title %}新增樂譜 — 百韻管樂團{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'scores:score_list' %}">樂譜庫存</a></li>
    <li class="breadcrumb-item active">新增樂譜</li>
  </ol>
</nav>

{% if messages %}
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
{% endif %}

<div class="row justify-content-center">
  <div class="col-lg-7">
    <h2 class="mb-4">新增樂譜</h2>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">曲名 <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" value="{{ request.POST.title }}" required>
      </div>

      <div class="row">
        <div class="col-sm-6 mb-3">
          <label class="form-label fw-semibold">作曲家</label>
          <input type="text" name="composer" class="form-control" value="{{ request.POST.composer }}">
        </div>
        <div class="col-sm-6 mb-3">
          <label class="form-label fw-semibold">編曲者</label>
          <input type="text" name="arranger" class="form-control" value="{{ request.POST.arranger }}">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">譜種 <span class="text-danger">*</span></label>
        <select name="score_type" id="id_score_type" class="form-select" required>
          <option value="">請選擇</option>
          {% for value, label in score_type_choices %}
          <option value="{{ value }}" {% if request.POST.score_type == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div id="part-fields" class="row" style="display:none">
        <div class="col-sm-6 mb-3">
          <label class="form-label fw-semibold">樂器 <span class="text-danger">*</span></label>
          <select name="instrument" class="form-select">
            <option value="">請選擇</option>
            {% for inst in instruments %}
            <option value="{{ inst.pk }}" {% if request.POST.instrument == inst.pk|stringformat:"s" %}selected{% endif %}>
              {{ inst.family.name }} － {{ inst.name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-6 mb-3">
          <label class="form-label fw-semibold">聲部 <span class="text-muted small">（選填）</span></label>
          <select name="section" class="form-select">
            <option value="">不指定</option>
            {% for sec in sections %}
            <option value="{{ sec.pk }}" {% if request.POST.section == sec.pk|stringformat:"s" %}selected{% endif %}>
              {{ sec.name }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">版權狀態 <span class="text-danger">*</span></label>
        <select name="copyright_status" class="form-select" required>
          <option value="">請選擇</option>
          {% for value, label in copyright_choices %}
          <option value="{{ value }}" {% if request.POST.copyright_status == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="row">
        <div class="col-sm-4 mb-3">
          <label class="form-label fw-semibold">實體紙本數量</label>
          <input type="number" name="physical_quantity" class="form-control" min="0"
                 value="{{ request.POST.physical_quantity|default:'0' }}">
        </div>
        <div class="col-sm-4 mb-3">
          <label class="form-label fw-semibold">來源</label>
          <select name="source" class="form-select">
            <option value="">未指定</option>
            {% for value, label in source_choices %}
            <option value="{{ value }}" {% if request.POST.source == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-4 mb-3">
          <label class="form-label fw-semibold">難度</label>
          <select name="difficulty" class="form-select">
            <option value="">未指定</option>
            {% for value, label in difficulty_choices %}
            <option value="{{ value }}" {% if request.POST.difficulty == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">出版商 <span class="text-muted small">（選填）</span></label>
        <input type="text" name="publisher" class="form-control" value="{{ request.POST.publisher }}">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">改版自 <span class="text-muted small">（選填，用於版本鏈）</span></label>
        <select name="parent_score" class="form-select">
          <option value="">原版（無）</option>
          {% for s in scores_for_parent %}
          <option value="{{ s.pk }}" {% if request.POST.parent_score == s.pk|stringformat:"s" %}selected{% endif %}>
            {{ s }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">改版說明 <span class="text-muted small">（選填）</span></label>
        <textarea name="version_note" class="form-control" rows="2">{{ request.POST.version_note }}</textarea>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">樂譜 PDF <span class="text-muted small">（選填，之後也可補上傳）</span></label>
        <input type="file" name="file" accept=".pdf" class="form-control">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">新增樂譜</button>
        <a href="{% url 'scores:score_list' %}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  var typeSelect = document.getElementById('id_score_type');
  var partFields = document.getElementById('part-fields');

  function syncPartFields() {
    partFields.style.display = typeSelect.value === 'part' ? '' : 'none';
  }

  typeSelect.addEventListener('change', syncPartFields);
  syncPartFields();
})();
</script>
{% endblock %}
