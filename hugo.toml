baseURL = 'https://sammy51305.github.io/FJCWO-Web/'
languageCode = 'zh-tw'
title = '輔仁百韻管樂團'
theme = 'LoveIt'

# 核心路徑設定
canonifyURLs = true
relativeURLs = false

[params]
    # ... 其他設定
    [params.header]
        # 手機版是否切換主題 (黑白模式)
        theme_change_mode = "auto"
        [params.header.title]
            # 這裡是顯示在網頁左上角的文字
            name = "" 
            pre = "<img src='/images/fjcwo_navbar.png' style='height:60px; vertical-align:middle;'>"
            post = ""
            typeit = false
    [params.home]
        # 是否顯示首頁個人訊息區塊
        showFullDescription = false
        [params.home.profile]
            enable = true
            # 1. 這裡就是那串會動的文字！
            # 你可以改成適合樂團的導語
            subtitle = ["傳承百韻精神", "凝聚校友力量", "續寫管樂樂章"]
            
            # 2. 是否開啟打字機效果 (如果你想讓它繼續動)
            typeit = true
            
            # 3. 頭像設定 (如果你想放 Logo 在中間也可以，不想放就設為 false)
            # avatarURL = "/images/fjcwo_logo.png"

    [params.app]
        title = "輔仁百韻"
        # 你的 site.webmanifest 檔名似乎是 manifest.json，請確認最上方有這一行
        manifest = "/images/site.webmanifest"

        [params.app.icon]
            # 通用 Favicon
            favicon_16x16 = "/images/favicon-16x16.png"
            favicon_32x32 = "/images/favicon-32x32.png"
            # 你圖片中檔名為 favicon.ico，這通常包含多種尺寸，LoveIt 可同時引用
            favicon_96x96 = "/images/favicon-96x96.png" 

            # Apple 設備 (iPhone/iPad)
            apple_touch_icon = "/images/apple-touch-icon.png"
            # 主題通常只需定義一個總圖，但若你想細分，可以保留預設值，iOS 會自動抓取最適合的

            # Android / Web App Manifest
            # 對應你的 android-icon-192x192.png 等檔案
            android_chrome_36x36 = "/images/android-icon-36x36.png"
            android_chrome_48x48 = "/images/android-icon-48x48.png"
            android_chrome_72x72 = "/images/android-icon-72x72.png"
            android_chrome_96x96 = "/images/android-icon-96x96.png"
            android_chrome_144x144 = "/images/android-icon-144x144.png"
            android_chrome_192x192 = "/images/android-icon-192x192.png"

            # Windows (Microsoft) Tile Icons
            # 對應你的 ms-icon-144x144.png 等檔案
            msapplication_tile_image = "/images/ms-icon-144x144.png" # 這是 Tile 的圖案
            # LoveIt 預設 msapplication_tile_color 為空白，這會使用主題的主色

    [params.search]
        enable = true
        # 搜索引擎的类型 ["lunr", "algolia"]
        type = "lunr"
        # 文章内容最长索引长度
        contentLength = 4000
        # 搜索框的占位提示语
        placeholder = ""
        # LoveIt 新增 | 0.2.1 最大结果数目
        maxResultLength = 10
        # LoveIt 新增 | 0.2.3 结果内容片段长度
        snippetLength = 50
        # LoveIt 新增 | 0.2.1 搜索结果中高亮部分的 HTML 标签
        highlightTag = "em"
        # LoveIt 新增 | 0.2.4 是否在搜索索引中使用基于 baseURL 的绝对路径
        absoluteURL = false
        [params.search.algolia]
            index = ""
            appID = ""
            searchKey = ""
[menu]
    [[menu.main]]
        name = "關於百韻"
        url = "/docs/about/"
        weight = 10
    [[menu.main]]
        name = "組織章程"
        url = "/docs/rules/"
        weight = 20
    [[menu.main]]
        name = "校友報到"
        url = "/alumni/join-us/"
        weight = 30